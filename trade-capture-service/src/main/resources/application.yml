server:
  port: 8085

spring:
  application:
    name: trade-capture-service
  datasource:
    url: jdbc:h2:mem:tradecapture;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

tradecapture:
  dispatch:
    lifecycle-base-url: http://localhost:8090
    batch-size: 100
    max-attempts: 5
